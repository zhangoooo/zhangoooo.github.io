<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可折叠侧边栏</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f2ed;
            --surface: #2a2a2a;
            --surface-hover: #3a3a3a;
            --accent: #d4583a;
            --accent-light: #e8764e;
            --text-primary: #f0ece4;
            --text-muted: #8a8580;
            --sidebar-width: 280px;
            --sidebar-collapsed: 72px;
            --transition-speed: 0.4s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Mono', monospace;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
        }

        /* 侧边栏 */
        .sidebar {
            width: var(--sidebar-width);
            min-height: 100vh;
            background: var(--surface);
            position: relative;
            transition: width var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            flex-shrink: 0;
        }

        .sidebar.collapsed {
            width: var(--sidebar-collapsed);
        }

        /* 顶部区域 */
        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo {
            width: 32px;
            height: 32px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 16px;
            color: white;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        .sidebar.collapsed .logo {
            transform: scale(0.9);
        }

        .brand-name {
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            font-size: 18px;
            color: var(--text-primary);
            white-space: nowrap;
            opacity: 1;
            transition: opacity 0.2s ease;
        }

        .sidebar.collapsed .brand-name {
            opacity: 0;
            pointer-events: none;
        }

        /* 折叠按钮 */
        .toggle-btn {
            position: absolute;
            right: -14px;
            top: 50%;
            transform: translateY(-50%);
            width: 28px;
            height: 28px;
            background: var(--accent);
            border: 3px solid var(--bg);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .toggle-btn:hover {
            background: var(--accent-light);
            transform: translateY(-50%) scale(1.1);
        }

        .toggle-btn svg {
            width: 12px;
            height: 12px;
            fill: white;
            transition: transform var(--transition-speed) ease;
        }

        .sidebar.collapsed .toggle-btn svg {
            transform: rotate(180deg);
        }

        /* 导航菜单 */
        .nav-menu {
            padding: 20px 12px;
        }

        .nav-section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--text-muted);
            padding: 0 8px;
            margin-bottom: 12px;
            white-space: nowrap;
            opacity: 1;
            transition: opacity 0.2s ease;
        }

        .sidebar.collapsed .nav-section-title {
            opacity: 0;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 14px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-bottom: 4px;
            position: relative;
            color: var(--text-muted);
            text-decoration: none;
        }

        .nav-item:hover {
            background: var(--surface-hover);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: rgba(212, 88, 58, 0.15);
            color: var(--accent);
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 20px;
            background: var(--accent);
            border-radius: 0 3px 3px 0;
        }

        .nav-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-icon svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .nav-text {
            font-size: 14px;
            white-space: nowrap;
            opacity: 1;
            transition: opacity 0.2s ease;
        }

        .sidebar.collapsed .nav-text {
            opacity: 0;
            pointer-events: none;
        }

        .nav-badge {
            margin-left: auto;
            background: var(--accent);
            color: white;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 400;
            opacity: 1;
            transition: opacity 0.2s ease;
        }

        .sidebar.collapsed .nav-badge {
            opacity: 0;
        }

        /* 分割线 */
        .nav-divider {
            height: 1px;
            background: rgba(255,255,255,0.06);
            margin: 16px 8px;
        }

        /* 用户信息 */
        .user-section {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.08);
            background: var(--surface);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #f0a050);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            font-size: 14px;
            color: white;
            flex-shrink: 0;
        }

        .user-details {
            overflow: hidden;
            opacity: 1;
            transition: opacity 0.2s ease;
        }

        .sidebar.collapsed .user-details {
            opacity: 0;
            pointer-events: none;
        }

        .user-name {
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-primary);
            white-space: nowrap;
        }

        .user-role {
            font-size: 12px;
            color: var(--text-muted);
            white-space: nowrap;
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            padding: 40px;
            transition: padding var(--transition-speed) ease;
        }

        .content-header {
            margin-bottom: 40px;
        }

        .content-header h1 {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 32px;
            color: var(--surface);
            margin-bottom: 8px;
        }

        .content-header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
        }

        .content-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .content-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }

        .card-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }

        .card-icon svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        .card-icon.blue { background: linear-gradient(135deg, #4a90d9, #357abd); }
        .card-icon.green { background: linear-gradient(135deg, #50c878, #3da66d); }
        .card-icon.orange { background: linear-gradient(135deg, var(--accent), var(--accent-light)); }
        .card-icon.purple { background: linear-gradient(135deg, #9b59b6, #8e44ad); }

        .card-title {
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            font-size: 16px;
            color: var(--surface);
            margin-bottom: 8px;
        }

        .card-value {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 28px;
            color: var(--surface);
        }

        .card-change {
            font-size: 12px;
            color: #50c878;
            margin-top: 8px;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                height: 100vh;
                z-index: 1000;
            }

            .sidebar.collapsed {
                left: calc(-1 * (var(--sidebar-width) - var(--sidebar-collapsed)));
            }

            .main-content {
                margin-left: var(--sidebar-collapsed);
                padding: 24px;
            }

            .toggle-btn {
                right: -14px;
            }
        }
    </style>
</head>
<body>
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">M</div>
            <span class="brand-name">MiPanel</span>
        </div>

        <button class="toggle-btn" id="toggleBtn" aria-label="折叠/展开侧边栏">
            <svg viewBox="0 0 24 24">
                <path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6z"/>
            </svg>
        </button>

        <nav class="nav-menu">
            <div class="nav-section-title">主要功能</div>

            <a href="#" class="nav-item active">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
                </span>
                <span class="nav-text">仪表盘</span>
            </a>

            <a href="#" class="nav-item">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>
                </span>
                <span class="nav-text">数据分析</span>
                <span class="nav-badge">12</span>
            </a>

            <a href="#" class="nav-item">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                </span>
                <span class="nav-text">用户管理</span>
            </a>

            <div class="nav-divider"></div>
            <div class="nav-section-title">工具</div>

            <a href="#" class="nav-item">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
                </span>
                <span class="nav-text">系统设置</span>
            </a>

            <a href="#" class="nav-item">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>
                </span>
                <span class="nav-text">分享链接</span>
            </a>

            <div class="nav-divider"></div>
            <div class="nav-section-title">其他</div>

            <a href="#" class="nav-item">
                <span class="nav-icon">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                </span>
                <span class="nav-text">帮助中心</span>
            </a>
        </nav>

        <div class="user-section">
            <div class="user-info">
                <div class="user-avatar">张</div>
                <div class="user-details">
                    <div class="user-name">张明</div>
                    <div class="user-role">管理员</div>
                </div>
            </div>
        </div>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content">
        <div class="content-header">
            <h1>欢迎回来</h1>
            <p>这是您的工作台概览，点击左侧边栏的按钮可以展开或折叠菜单</p>
        </div>

        <div class="content-grid">
            <div class="content-card">
                <div class="card-icon blue">
                    <svg viewBox="0 0 24 24"><path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z"/></svg>
                </div>
                <div class="card-title">总访问量</div>
                <div class="card-value">24,583</div>
                <div class="card-change">↑ 12.5% 较上月</div>
            </div>

            <div class="content-card">
                <div class="card-icon green">
                    <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
                </div>
                <div class="card-title">活跃用户</div>
                <div class="card-value">3,247</div>
                <div class="card-change">↑ 8.2% 较上月</div>
            </div>

            <div class="content-card">
                <div class="card-icon orange">
                    <svg viewBox="0 0 24 24"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg>
                </div>
                <div class="card-title">总收入</div>
                <div class="card-value">¥89,432</div>
                <div class="card-change">↑ 23.1% 较上月</div>
            </div>

            <div class="content-card">
                <div class="card-icon purple">
                    <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
                </div>
                <div class="card-title">完成任务</div>
                <div class="card-value">156</div>
                <div class="card-change">↑ 5.7% 较上月</div>
            </div>
        </div>
    </main>

    <script>
        const sidebar = document.getElementById('sidebar');
        const toggleBtn = document.getElementById('toggleBtn');

        toggleBtn.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
        });

        // 导航项点击效果
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(item => {
            item.addEventListener('click', (e) => {
                e.preventDefault();
                navItems.forEach(i => i.classList.remove('active'));
                item.classList.add('active');
            });
        });

        // 键盘快捷键 (Escape 折叠/展开)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                sidebar.classList.toggle('collapsed');
            }
        });
    </script>
</body>
</html>
