<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown 预览器</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f6f8fa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    .toolbar {
      background: #24292f;
      color: #fff;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .toolbar h1 {
      font-size: 18px;
      font-weight: 600;
    }

    .file-input-wrapper {
      position: relative;
    }

    .file-input-wrapper label {
      display: inline-block;
      background: #fff;
      color: #24292f;
      padding: 6px 16px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .file-input-wrapper label:hover {
      background: #eaeef2;
    }

    .file-input-wrapper input {
      position: absolute;
      left: -9999px;
    }

    #fileCount {
      font-size: 13px;
      color: #8b949e;
    }

    .main {
      display: flex;
      height: calc(100vh - 52px);
    }

    .sidebar {
      width: 260px;
      background: #fff;
      border-right: 1px solid #d0d7de;
      overflow: hidden;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      transition: width 0.25s ease;
      position: relative;
    }

    .sidebar.collapsed {
      width: 20px;
    }

    .sidebar.collapsed .sidebar-header,
    .sidebar.collapsed .file-list {
      opacity: 0;
      visibility: hidden;
    }

    .sidebar-header {
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 600;
      color: #656d76;
      border-bottom: 1px solid #d0d7de;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: opacity 0.15s ease, visibility 0.15s ease;
      white-space: nowrap;
    }

    .collapse-btn {
      position: absolute;
      right: -17px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 5;
      width: 20px;
      height: 52px;
      background: #24292f;
      border: 1px solid #1b1f24;
      border-left: none;
      border-radius: 0 5px 5px 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: right 0.25s ease, background 0.15s;
      padding: 0;
    }

    .collapse-btn:hover {
      background: #444c56;
    }

    .collapse-btn .arrow {
      font-size: 12px;
      color: #8b949e;
      transition: transform 0.25s ease;
    }

    .sidebar.collapsed .collapse-btn {
      right: -36px;
      border-left: 1px solid #1b1f24;
      border-radius: 0 5px 5px 0;
    }

    .sidebar.collapsed .collapse-btn .arrow {
      transform: rotate(180deg);
    }

    .file-list {
      flex: 1;
      overflow-y: auto;
    }

    .file-list.empty::after {
      content: '请添加 .md 文件';
      display: block;
      padding: 24px 16px;
      color: #8b949e;
      font-size: 13px;
      text-align: center;
    }

    .file-item {
      display: flex;
      align-items: center;
      padding: 8px 12px;
      border-bottom: 1px solid #f0f2f5;
      cursor: default;
      user-select: none;
      transition: background 0.15s;
    }

    .file-item:hover {
      background: #f6f8fa;
    }

    .file-item.active {
      background: #ddf4ff;
      border-left: 3px solid #0969da;
    }

    .file-item.drag-over {
      background: #d0e8ff;
      border-top: 2px solid #0969da;
    }

    .file-item.dragging {
      opacity: 0.5;
    }

    .drag-handle {
      cursor: grab;
      color: #8b949e;
      margin-right: 8px;
      font-size: 14px;
      flex-shrink: 0;
    }

    .drag-handle:active {
      cursor: grabbing;
    }

    .file-item-name {
      flex: 1;
      font-size: 13px;
      color: #24292f;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-item-remove {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      border: none;
      background: none;
      color: #8b949e;
      font-size: 16px;
      cursor: pointer;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
    }

    .file-item:hover .file-item-remove {
      opacity: 1;
    }

    .file-item-remove:hover {
      color: #cf222e;
      background: #ffebe9;
    }

    .preview-area {
      flex: 1;
      overflow-y: auto;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #8b949e;
      font-size: 16px;
    }

    .markdown-body {
      display: none;
    }

    .markdown-body.visible {
      display: block;
    }

    .md-separator {
      border: none;
      border-top: 1px solid #d0d7de;
      margin: 32px 0 24px;
      position: relative;
    }

    .markdown-body .mermaid {
      display: flex;
      justify-content: center;
      margin: 16px 0;
      padding: 16px;
      background: #fff;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      overflow-x: auto;
      cursor: pointer;
      transition: box-shadow 0.15s;
    }

    .markdown-body .mermaid:hover {
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }

    .mermaid-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0,0,0,0.7);
    }

    .mermaid-overlay.open {
      display: block;
    }

    .mermaid-overlay-toolbar {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 101;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .mermaid-overlay-toolbar button {
      background: #24292f;
      color: #fff;
      border: none;
      padding: 6px 14px;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .mermaid-overlay-toolbar button:hover {
      background: #444c56;
    }

    .mermaid-overlay-content {
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    .mermaid-overlay-content .mermaid {
      transform-origin: center center;
      border: none;
      background: none;
      margin: 0;
      padding: 0;
      cursor: move;
      overflow: visible;
    }

    .md-separator::after {
      content: '✦';
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      background: #f6f8fa;
      padding: 0 8px;
      color: #8b949e;
      font-size: 10px;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <h1>Markdown 预览器</h1>
    <div class="file-input-wrapper">
      <label for="fileInput">选择文件</label>
      <input type="file" id="fileInput" accept=".md,.markdown" multiple>
    </div>
    <span id="fileCount"></span>
  </div>

  <div class="main">
    <div class="sidebar" id="sidebar">
      <button class="collapse-btn" id="collapseBtn" title="折叠"><span class="arrow">&laquo;</span></button>
      <div class="sidebar-header">文件列表</div>
      <div class="file-list empty" id="fileList"></div>
    </div>

    <div class="preview-area">
      <div id="placeholder" class="placeholder">请添加 .md 文件</div>
      <div class="container">
        <div id="content" class="markdown-body"></div>
      </div>
    </div>
  </div>

  <div class="mermaid-overlay" id="mermaidOverlay">
    <div class="mermaid-overlay-toolbar">
      <button id="overlayZoomOut" title="缩小">&minus;</button>
      <button id="overlayZoomReset" title="重置">1:1</button>
      <button id="overlayZoomIn" title="放大">&plus;</button>
      <button id="overlayClose" title="关闭">&times;</button>
    </div>
    <div class="mermaid-overlay-content" id="overlayContent"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <script>
    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');
    const content = document.getElementById('content');
    const placeholder = document.getElementById('placeholder');
    const fileCount = document.getElementById('fileCount');
    const sidebar = document.getElementById('sidebar');
    const collapseBtn = document.getElementById('collapseBtn');
    const previewArea = document.querySelector('.preview-area');

    collapseBtn.addEventListener('click', () => {
      sidebar.classList.toggle('collapsed');
    });

    mermaid.initialize({ startOnLoad: false, theme: 'default' });

    const files = [];
    let dragIndex = -1;

    function updateUI() {
      fileCount.textContent = files.length ? `${files.length} 个文件` : '';
      fileList.classList.toggle('empty', files.length === 0);
      renderFileList();
      renderPreview();
    }

    function renderFileList() {
      fileList.innerHTML = '';
      files.forEach((file, index) => {
        const item = document.createElement('div');
        item.className = 'file-item';
        item.draggable = true;
        item.dataset.index = index;

        item.innerHTML = `
          <span class="drag-handle">⠿</span>
          <span class="file-item-name" title="${escapeHtml(file.name)}">${escapeHtml(file.name)}</span>
          <button class="file-item-remove" title="移除">&times;</button>
        `;

        item.querySelector('.file-item-remove').addEventListener('click', () => {
          files.splice(index, 1);
          updateUI();
        });

        item.addEventListener('dragstart', (e) => {
          dragIndex = index;
          item.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
        });

        item.addEventListener('dragend', () => {
          item.classList.remove('dragging');
          fileList.querySelectorAll('.file-item').forEach(el => el.classList.remove('drag-over'));
          dragIndex = -1;
        });

        item.addEventListener('dragover', (e) => {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          if (index !== dragIndex) {
            item.classList.add('drag-over');
          }
        });

        item.addEventListener('dragleave', () => {
          item.classList.remove('drag-over');
        });

        item.addEventListener('drop', (e) => {
          e.preventDefault();
          item.classList.remove('drag-over');
          if (dragIndex !== -1 && dragIndex !== index) {
            const [moved] = files.splice(dragIndex, 1);
            files.splice(index, 0, moved);
            dragIndex = -1;
            updateUI();
          }
        });

        fileList.appendChild(item);
      });
    }

    async function renderPreview() {
      if (files.length === 0) {
        content.classList.remove('visible');
        placeholder.style.display = '';
        return;
      }

      placeholder.style.display = 'none';
      let html = '';
      for (let i = 0; i < files.length; i++) {
        const md = await files[i].text();
        if (i > 0) {
          html += '<hr class="md-separator">';
        }
        html += marked.parse(md);
      }
      content.innerHTML = html;
      content.classList.add('visible');
      await renderMermaid();
    }

    async function renderMermaid() {
      const mermaidBlocks = content.querySelectorAll('code.language-mermaid');
      if (mermaidBlocks.length === 0) return;
      for (const code of mermaidBlocks) {
        const pre = code.parentElement;
        const div = document.createElement('div');
        div.className = 'mermaid';
        div.textContent = code.textContent;
        pre.replaceWith(div);
      }
      await mermaid.run({ querySelector: '.mermaid' });
      content.querySelectorAll('.mermaid').forEach(el => {
        el.addEventListener('click', (e) => openMermaidOverlay(el));
      });
    }

    // --- Overlay ---
    const overlay = document.getElementById('mermaidOverlay');
    const overlayContent = document.getElementById('overlayContent');
    let overlayScale = 1;
    let overlayPanX = 0;
    let overlayPanY = 0;
    let overlayDragging = false;
    let overlayDragStartX = 0;
    let overlayDragStartY = 0;
    let overlayPanStartX = 0;
    let overlayPanStartY = 0;

    function openMermaidOverlay(sourceEl) {
      overlay.classList.add('open');
      overlayScale = 1;
      overlayPanX = 0;
      overlayPanY = 0;
      overlayContent.innerHTML = '';
      const clone = sourceEl.cloneNode(true);
      clone.style.transform = '';
      overlayContent.appendChild(clone);
    }

    function closeOverlay() {
      overlay.classList.remove('open');
    }

    function applyOverlayTransform() {
      const el = overlayContent.querySelector('.mermaid');
      if (!el) return;
      el.style.transform = `scale(${overlayScale}) translate(${overlayPanX}px, ${overlayPanY}px)`;
    }

    function zoomOverlay(delta) {
      overlayScale = Math.max(0.2, Math.min(5, overlayScale + delta));
      applyOverlayTransform();
    }

    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) closeOverlay();
    });

    document.getElementById('overlayClose').addEventListener('click', closeOverlay);
    document.getElementById('overlayZoomIn').addEventListener('click', () => zoomOverlay(0.2));
    document.getElementById('overlayZoomOut').addEventListener('click', () => zoomOverlay(-0.2));
    document.getElementById('overlayZoomReset').addEventListener('click', () => {
      overlayScale = 1;
      overlayPanX = 0;
      overlayPanY = 0;
      applyOverlayTransform();
    });

    overlayContent.addEventListener('wheel', (e) => {
      e.preventDefault();
      zoomOverlay(e.deltaY < 0 ? 0.1 : -0.1);
    }, { passive: false });

    overlayContent.addEventListener('mousedown', (e) => {
      overlayDragging = true;
      overlayDragStartX = e.clientX;
      overlayDragStartY = e.clientY;
      overlayPanStartX = overlayPanX;
      overlayPanStartY = overlayPanY;
    });

    window.addEventListener('mousemove', (e) => {
      if (!overlayDragging) return;
      overlayPanX = overlayPanStartX + (e.clientX - overlayDragStartX) / overlayScale;
      overlayPanY = overlayPanStartY + (e.clientY - overlayDragStartY) / overlayScale;
      applyOverlayTransform();
    });

    window.addEventListener('mouseup', () => {
      overlayDragging = false;
    });

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    fileInput.addEventListener('change', () => {
      for (const file of fileInput.files) {
        if (!files.some(f => f.name === file.name && f.size === file.size && f.lastModified === file.lastModified)) {
          files.push(file);
        }
      }
      fileInput.value = '';
      updateUI();
    });

    // Allow drag-and-drop of files onto the sidebar too
    fileList.addEventListener('dragover', (e) => {
      if (e.dataTransfer.types.includes('Files')) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'copy';
      }
    });

    fileList.addEventListener('drop', (e) => {
      if (e.dataTransfer.types.includes('Files')) {
        e.preventDefault();
        for (const file of e.dataTransfer.files) {
          if ((file.name.endsWith('.md') || file.name.endsWith('.markdown')) &&
              !files.some(f => f.name === file.name && f.size === file.size && f.lastModified === file.lastModified)) {
            files.push(file);
          }
        }
        updateUI();
      }
    });

    // Touch drag-and-drop for file items (mobile support)
    let touchDragItem = null;
    let touchClone = null;
    let touchStartY = 0;
    let touchCurrentY = 0;

    fileList.addEventListener('touchstart', (e) => {
      const item = e.target.closest('.file-item');
      if (!item || e.target.closest('.file-item-remove')) return;
      touchDragItem = item;
      touchStartY = e.touches[0].clientY;
    }, { passive: false });

    fileList.addEventListener('touchmove', (e) => {
      if (!touchDragItem) return;
      e.preventDefault();
      touchCurrentY = e.touches[0].clientY;
      const items = [...fileList.querySelectorAll('.file-item:not(.dragging)')];
      items.forEach(el => el.classList.remove('drag-over'));
      for (const item of items) {
        const rect = item.getBoundingClientRect();
        const mid = rect.top + rect.height / 2;
        if (touchCurrentY < mid && touchCurrentY > rect.top - rect.height / 2) {
          item.classList.add('drag-over');
          break;
        }
      }
    }, { passive: false });

    fileList.addEventListener('touchend', () => {
      if (!touchDragItem) return;
      const items = [...fileList.querySelectorAll('.file-item:not(.dragging)')];
      items.forEach(el => el.classList.remove('drag-over'));
      const oldIndex = parseInt(touchDragItem.dataset.index);

      let targetIndex = -1;
      for (const item of items) {
        const rect = item.getBoundingClientRect();
        const mid = rect.top + rect.height / 2;
        if (touchCurrentY < mid) {
          targetIndex = parseInt(item.dataset.index);
          break;
        }
      }

      if (targetIndex !== -1 && targetIndex !== oldIndex) {
        if (targetIndex > oldIndex) targetIndex--;
        const [moved] = files.splice(oldIndex, 1);
        files.splice(targetIndex, 0, moved);
        updateUI();
      }
      touchDragItem = null;
    });
  </script>
</body>
</html>
